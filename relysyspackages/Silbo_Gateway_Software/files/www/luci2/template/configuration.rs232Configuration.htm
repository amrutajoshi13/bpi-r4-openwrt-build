<div id="snmpContentWrapper" style="margin-top: 20px;">

    </div>

                <h3 class="panel-title">RS232 Configuration</h3>
            </div>

                <!-- Input shown when SNMP is enabled -->

                    <div style="width: 35%;">

                    </div>

                    <div style="width: 20%;">
                        <label for="deviceDelay" style="display: block;">
                            Delay
                        </label>
                        <input type="number" class="form-control" id="deviceDelay">
                    </div>

                </div>
                <div id="customTabs">
                    <button class="custom-tab-button selected" data-target="snmpMasterDiv">RS232 Configuration</button>
                    <button class="custom-tab-button" data-target="sendConfigDiv" id="sendConfigTab">Send
                        Configuration</button>
                </div>


                <div id="snmpTabContent">
                    <div id="snmpMasterDiv" class="custom-tab-content visible" style="margin-bottom: 100px;">
                        <div class="main-container">
                            <div class="container">
                                <div class="row">
                                    <button type="button" class="btn btn-primary" id="smpmasterdevice"
                                        data-toggle="modal" data-target="#SNMPMasterModal"
                                        style="float:right;margin: 0px 28px 0 0;">
                                        Add Device</button>
                                </div>
                                <div class="table-container">
                                    <table id="devicesTable" class="table">
                                        <thead></thead>
                                        <tbody></tbody>
                                    </table>
                                </div>

                            </div>

                            <!-- Add Device Modal -->
                            <div class="modal fade" id="SNMPMasterModal" tabindex="-1"
                                aria-labelledby="addDeviceModalLabel" aria-hidden="true" data-backdrop="static"
                                data-keyboard="false">
                                <div class="modal-dialog" role="document">
                                    <div class="modal-content">

                                        <div class="modal-header">
                                            <h3 class="modal-title" id="addDeviceModalLabel">Add RS232 Configuration
                                            </h3>
                                            <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                                                <span aria-hidden="true">&times;</span>
                                            </button>
                                        </div>
                                        <div class="modal-body" id="navbar-example">
                                            <div class="tab-content">
                                                <div class="tab-pane active" id="communicationconfig" name="attributes"
                                                    role="tabpanel" style="margin-top: 15px;">
                                                    <form id="snmp-device-config" novalidate>
                                                        <div class="row">
                                                            <div class="col-md-3">
                                                                <div class="form-group">
                                                                    <label id="requiredfield" for="deviceName">DEVICE
                                                                        NAME</label>
                                                                    <input type="text" name="Device Name"
                                                                        class="form-control inputbox" id="deviceName"
                                                                        oninput="validateDeviceName()">
                                                                </div>
                                                            </div>
                                                        </div>
                                                        <div class="row">
                                                            <div class="col-md-3">
                                                                <div class="form-group">
                                                                    <label id="requiredfield"
                                                                        for="interfaceid">Interface ID</label>
                                                                    <input type="number" class="form-control inputbox"
                                                                        name="Interface ID" id="interfaceid"
                                                                        placeholder="1">
                                                                </div>
                                                            </div>
                                                            <div class="col-md-3">
                                                                <div class="form-group">
                                                                    <label id="requiredfield" for="meterid">Meter
                                                                        ID</label>
                                                                    <input type="number" class="form-control inputbox"
                                                                        name="Meter ID" id="meterid" placeholder="1">
                                                                </div>
                                                            </div>
                                                            <div class="col-md-3">
                                                                <div class="form-group">
                                                                    <label id="requiredfield"
                                                                        for="metermodel">Model</label>
                                                                    <input type="text" class="form-control inputbox"
                                                                        id="metermodel" name="Meter Model">
                                                                </div>
                                                            </div>
                                                            <div class="col-md-3">
                                                                <div class="form-group">
                                                                    <label id="requiredfield" for="serialslaveid">Slave
                                                                        Address</Address>
                                                                    </label>
                                                                    <input type="number" class="form-control inputbox"
                                                                        id="serialslaveid" placeholder="1-255"
                                                                        name="Slave Address">
                                                                </div>
                                                                <div id="updateMessage"
                                                                    style="display: none; color: red; font-weight: bold;">
                                                                </div>
                                                            </div>
                                                        </div>
                                                        <div class="row">
                                                            <div class="col-md-3">
                                                                <div class="form-group" id="parityGroup1">
                                                                    <label id="requiredfield" for="serialbaudrate">Baud
                                                                        rate</label>
                                                                    <select name="Baudrate" id="serialbaudrate"
                                                                        class="form-control">
                                                                        <option value="9600">9600</option>
                                                                        <option value="115200">115200</option>
                                                                        <option value="110">110</option>
                                                                        <option value="300">300</option>
                                                                        <option value="600">600</option>
                                                                        <option value="1200">1200</option>
                                                                        <option value="1800">1800</option>
                                                                        <option value="2400">2400</option>
                                                                        <option value="4800">4800</option>
                                                                        <option value="14400">14400</option>
                                                                        <option value="19200">19200</option>
                                                                        <option value="38400">38400</option>
                                                                        <option value="57600">57600</option>
                                                                        <option value="128000">128000</option>
                                                                        <option value="256000">256000</option>
                                                                    </select>
                                                                </div>
                                                            </div>
                                                            <div class="col-md-3">
                                                                <div class="form-group" id="parityGroup2">
                                                                    <label id="requiredfield"
                                                                        for="serialparity">Parity</label>
                                                                    <select name="parity" id="serialparity"
                                                                        class="form-control">
                                                                        <option value="0">0-NONE</option>
                                                                        <option value="1">1-ODD</option>
                                                                        <option value="2">2-EVEN</option>
                                                                    </select>
                                                                </div>
                                                            </div>
                                                            <div class="col-md-3">
                                                                <div class="form-group" id="parityGroup3">
                                                                    <label id="requiredfield" for="serialdatabits">No.of
                                                                        Databits</label>
                                                                    <select name="databits" id="serialdatabits"
                                                                        class="form-control">
                                                                        <option value="7">7</option>
                                                                        <option value="8">8</option>
                                                                    </select>
                                                                </div>
                                                            </div>
                                                            <div class="col-md-3">
                                                                <div class="form-group" id="parityGroup4">
                                                                    <label id="requiredfield" for="serialstopbit">No.of
                                                                        Stopbits</label>
                                                                    <select name="cars" id="serialstopbit"
                                                                        class="form-control">
                                                                        <option value="1">1</option>
                                                                        <option value="2">2</option>
                                                                    </select>
                                                                </div>
                                                            </div>
                                                        </div>
                                                        <div class="row">
                                                            <div class="col-md-3">
                                                                <div class="form-group" id="functioncode1">
                                                                    <label id="requiredfield"
                                                                        for="functioncode">Function Code</label>
                                                                    <select name="function code" id="functioncode"
                                                                        class="form-control">
                                                                        <option value="3">3</option>
                                                                        <option value="4">4</option>
                                                                    </select>
                                                                </div>
                                                            </div>
                                                            <div class="col-md-3">
                                                                <div class="form-group" id="flowcontrol1">
                                                                    <label id="requiredfield" for="flowcontrol">Flow
                                                                        Control</label>
                                                                    <select name="flow control" id="flowcontrol"
                                                                        class="form-control">
                                                                        <option value="0">0-No</option>
                                                                        <option value="1">1-Hardware</option>
                                                                        <option value="2">2-Software</option>
                                                                    </select>
                                                                </div>
                                                            </div>

                                                            <div class="col-md-3">
                                                                <div class="form-group">
                                                                    <label id="requiredfield" for="delay">Delay</label>
                                                                    <input type="text" class="form-control inputbox"
                                                                        id="delay" name="delay">
                                                                </div>
                                                            </div>

                                                            <div class="col-md-3">
                                                                <div class="form-group">
                                                                    <label id="requiredfield" for="startregister">Start
                                                                        Register</label>
                                                                    <input type="text" class="form-control inputbox"
                                                                        id="startregister" name="Start Register">
                                                                </div>
                                                            </div>

                                                        </div>
                                                        <div class="row">

                                                            <div class="col-md-3">
                                                                <div class="form-group">
                                                                    <label id="requiredfield" for="noOfRegister">No. of
                                                                        Register</label>
                                                                    <input type="text" class="form-control inputbox"
                                                                        id="noOfRegister" name="No of Register">
                                                                </div>
                                                            </div>
                                                        </div>
                                                    </form>
                                                </div>
                                            </div>

                                        </div>
                                        <div class="modal-footer">
                                            <button type="button" class="btn btn-secondary" data-dismiss="modal"
                                        id="closebutton1">Close</button>
                                            <button type="submit" class="btn btn-primary" id='saveDeviceButton'
                                                form="snmp-device-config">Save
                                                Device</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div id="loadingOverlay">
                                <div class="spinner"></div>
                            </div>

                            <div id="snmpToast" class="toast-container">
                                <span id="toastText"></span>
                            </div>
                        </div>
                    </div>
                </div>
                <div id="sendConfigDiv" class="custom-tab-content">
                    <h5>Data Sender Configuration</h5>
                    <div style="display: flex; justify-content: flex-end; margin-bottom: 15px; margin-right: 14px;">
                        <button class="btn btn-success" id="updateAllSendConfigsBtn">
                            Update Device
                        </button>
                    </div>

                    <div class="table-container" id="sendConfigTableContainer" style="display: none;">
                        <table id="sendConfigTable" class="table">
                            <thead>
                                <tr>
                                    <th>Field Number</th>
                                    <th>Field Content</th>
                                    <th>JSON Key Name</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>

                    <!-- Add Form -->
                    <div class="form-row mt-4 align-items-end"
                        style="border: 1px solid #eeeeee;padding: 15px;border-radius: 13px;box-shadow: 0px 1px 8px 4px rgba(0, 0, 0, 0.05);">
                        <div class="form-group col-md-4">
                            <label for="fieldContentDropdown">Field Content</label>
                            <select class="form-control" id="fieldContentDropdown">
                                <option value="">Loading...</option>
                            </select>
                        </div>
                        <div class="form-group col-md-4">
                            <label for="fieldJsonKey">Field JSON Key Name</label>
                            <input type="text" class="form-control" id="fieldJsonKey" placeholder="Enter JSON Key Name">
                        </div>
                        <div class="form-group col-md-4">
                            <label>&nbsp;</label> <!-- Aligns button properly -->
                            <button type="button" class="btn btn-primary" id="addSendConfigRow">Add</button>
                        </div>
                    </div>
                    <div class="modal fade" id="editSendConfigModal" tabindex="-1" aria-labelledby="editSendConfigLabel"
                        aria-hidden="true">
                        <div class="modal-dialog modal-dialog-centered modal-sm">
                            <div class="modal-content" style="padding: 14px;">
                                <h5 class="modal-title" id="editSendConfigLabel">Update Device</h5>
                                <div class="modal-body">
                                    <div class="form-group">
                                        <label for="editFieldContent">Field Content</label>
                                        <select class="form-control form-control-sm" id="editFieldContent">
                                            <option value="">Select</option>
                                        </select>
                                    </div>
                                    <div class="form-group">
                                        <label for="editFieldJsonKey">JSON Key Name</label>
                                        <input type="text" class="form-control form-control-sm" id="editFieldJsonKey"
                                            placeholder="Enter key">
                                    </div>
                                    <div class="form-group" id="jsonKeyValueGroup" style="display: none;">
                                        <label for="editJsonKeyValue">JSON Key Value</label>
                                        <input type="text" class="form-control form-control-sm" id="editJsonKeyValue"
                                            placeholder="Enter value">
                                    </div>

                                </div>
                                <div class="modal-footer d-flex justify-content-between">
                                    <button type="button" class="btn btn-secondary btn-sm"
                                        data-dismiss="modal">Cancel</button>
                                    <button type="button" class="btn btn-primary btn-sm"
                                        id="saveSendConfigChanges">Save</button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div id="sendConfigLoadingOverlay">
                        <div class="spinner"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById("serialslaveid").onkeyup = function () {
        var input = parseInt(this.value);
        if (isNaN(input)) {
            $("#serialslaveid").val("");
        }
        else {
            if (input < 1 || input > 255) {
                $("#serialslaveid").val("");
                return;
            }
        }
    }
    function updateToggleValue() {
        const toggle = document.getElementById('enableToggle');
        const value = toggle.checked ? 1 : 0;
    }



    // Tab switching logic

    document.querySelectorAll('.custom-tab-button').forEach(button => {
        button.addEventListener('click', () => {
            // Remove active from all buttons/content
            document.querySelectorAll('.custom-tab-button').forEach(btn => btn.classList.remove('selected'));
            document.querySelectorAll('.custom-tab-content').forEach(div => div.classList.remove('visible'));

            // Activate clicked tab
            button.classList.add('selected');
            const target = button.getAttribute('data-target');
            document.getElementById(target).classList.add('visible');
        });
    });

</script>
