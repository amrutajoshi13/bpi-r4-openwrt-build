<!-- ===== UNIFIED TOP CONTAINER - wraps everything ===== -->
<div style="border-bottom: 1px solid #70707038">
    <h1 class="header">Dashboard</h1>
</div>
<div class="pagecontent">
    <div class="panel panel-default">
        <div class="panel-heading">
            <h3 class="panel-title">Overview</h3>
        </div>

        <!-- THIS IS THE MISSING WRAPPER — adds padding on all sides -->
        <div class="dashboard-top-inner">

            <div class="top-header">
                <div class="top-header-left">
                    <div class="top-header-icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="7" height="7" rx="1" />
                            <rect x="14" y="3" width="7" height="7" rx="1" />
                            <rect x="3" y="14" width="7" height="7" rx="1" />
                            <rect x="14" y="14" width="7" height="7" rx="1" />
                        </svg>
                    </div>
                    <div>
                        <div class="top-header-sub">Device Monitoring</div>
                    </div>
                </div>
                <div class="controls-area">
                    <div class="last-refresh-pill">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10" />
                            <polyline points="12 6 12 12 16 14" />
                        </svg>
                        <span id="lastUpdated">Last Refresh: --</span>
                    </div>
                    <button id="refreshBtn" class="btn-refresh icon-only" title="Refresh dashboard"
                        aria-label="Refresh dashboard">
                        Refresh<span><img src="/luci2/icons/refresh1.svg" alt="Refresh" class="refresh-img"></span>
                    </button>
                </div>
            </div>

            <main class="dashboard-panel" id="dashboardPanel">

                <!-- Service Status Card -->
                <div class="status-card top-card" id="serviceStatusCard">
                    <div class="card-header-bar">
                        <div class="header-top-row">
                            <div class="card-header-icon">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                                    <circle cx="12" cy="12" r="10" />
                                    <polyline points="12 6 12 12 16 14" />
                                </svg>
                            </div>
                            <h3 class="card-header-title">Service Status</h3>
                        </div>
                    </div>
                    <div class="legend">
                        <div class="legend-item" onclick="toggleServiceFilter('running')">
                            <div class="color-box service-running-box"></div> Running
                        </div>
                        <div class="legend-item" onclick="toggleServiceFilter('disabled')">
                            <div class="color-box service-disabled-box"></div> Disabled
                        </div>
                    </div>
                    <div class="service-table-header">
                        <span>Name</span>
                        <span>Status</span>
                    </div>
                    <div class="card-body">
                        <div id="serviceStatusList" class="service-grid"></div>
                    </div>
                </div>

                <!-- DIO card -->
                <div class="status-card top-card" id="digitalio_card">
                    <div class="card-header-bar">
                        <div class="header-top-row">
                            <div class="card-header-icon">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="2" y="7" width="20" height="14" rx="2" />
                                    <path d="M16 3l-4 4-4-4" />
                                </svg>
                            </div>
                            <h3 class="card-header-title">DIO Status</h3>
                        </div>
                    </div>
                    <div class="legend">
                        <div class="legend-item" onclick="toggleFilter('di','on')">
                            <div class="color-box on"></div> ON
                        </div>
                        <div class="legend-item" onclick="toggleFilter('di','off')">
                            <div class="color-box off"></div> OFF
                        </div>
                        <div class="legend-item" onclick="toggleFilter('di','not')">
                            <div class="color-box not"></div> NOT
                        </div>
                    </div>
                    <div class="datemeta">
                        <div id="lastProduced"></div>
                        <div id="lastSent"></div>
                    </div>
                    <div class="card-body">
                        <div class="digitalinput" id="digitalinput"></div>
                    </div>
                </div>

                <!-- Analog card -->
                <div class="status-card top-card" id="analogInput_card">
                    <div class="card-header-bar">
                        <div class="header-top-row">
                            <div class="card-header-icon">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
                                </svg>
                            </div>
                            <h3 class="card-header-title">Analog Inputs</h3>
                        </div>
                    </div>
                    <div class="datemeta">
                        <div id="analogLastProduced"></div>
                        <div id="analogLastSent"></div>
                    </div>
                    <div class="card-body">
                        <div id="analoginput"></div>
                    </div>
                </div>

                <!-- Modbus -->
                <div class="snmp-card full-row" id="modbusCard" aria-live="polite">
                    <div class="card-header-bar">
                        <div class="header-top-row">
                            <div class="card-header-icon">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M4 4h16v4H4z" />
                                    <path d="M4 10h16v4H4z" />
                                    <path d="M4 16h16v4H4z" />
                                </svg>
                            </div>
                            <h3 class="card-header-title">Generic Modbus Info</h3>
                            <div class="header-actions">
                                <div class="snmp-meta" id="modbusMeta"></div>
                                <button class="header-btn config-btn" data-type="modbus">Open</button>
                            </div>
                        </div>
                    </div>
                    <div class="smart-table-wrap">
                        <table id="modbusTable" class="smart-table" role="table" aria-label="Modbus status table">
                        </table>
                    </div>
                </div>

                <!-- SNMP -->
                <div class="snmp-card full-row" id="snmpCard" aria-live="polite">
                    <div class="card-header-bar">
                        <div class="header-top-row">
                            <div class="card-header-icon">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2z" />
                                    <path d="M12 8v4l3 3" />
                                </svg>
                            </div>
                            <h3 class="card-header-title">SNMP Info</h3>
                            <div class="header-actions">
                                <div class="snmp-meta" id="snmpMeta"></div>
                                <button class="header-btn config-btn" data-type="snmp">Open</button>
                            </div>
                        </div>
                    </div>
                    <div class="smart-table-wrap">
                        <table id="snmpTable" class="smart-table" role="table" aria-label="SNMP status table"></table>
                    </div>
                </div>

                <!-- BACnet -->
                <div class="snmp-card full-row" id="bacnetCard" aria-live="polite">
                    <div class="card-header-bar">
                        <div class="header-top-row">
                            <div class="card-header-icon">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                                    <polyline points="9 22 9 12 15 12 15 22" />
                                </svg>
                            </div>
                            <h3 class="card-header-title">BACnet Info</h3>
                            <div class="header-actions">
                                <div class="snmp-meta" id="bacnetMeta"></div>
                                <button class="header-btn config-btn" data-type="bacnet">Open</button>
                            </div>
                        </div>
                    </div>
                    <div class="smart-table-wrap">
                        <table id="bacnetTable" class="smart-table" role="table" aria-label="BACnet status table">
                        </table>
                    </div>
                </div>

            </main>

        </div><!-- end dashboard-top-inner -->
    </div>
</div>

<style>
    :root {
        --page-bg-1: #eef3f7;
        --page-bg-2: #f8fbfd;
        --panel-bg: #ffffff;
        --muted: #6b7280;
        --text: #0f1724;
        --accent: #0ea5a4;
        --card-border: rgba(15, 23, 42, 0.12);
        --card-shadow: 0 8px 28px rgba(15, 23, 42, 0.06);
        --card-radius: 14px;

        --hdr-bg: #f0f5ff;
        --hdr-border: #c7d8f8;
        --hdr-icon-bg: #dbeafe;
        --hdr-icon-border: #bfdbfe;
        --hdr-icon-color: #1d4ed8;
        --hdr-title-color: #1e3a5f;
    }

    .full-row {
        grid-column: 1 / -1;
    }

    .dashboard-top-inner {
        background: var(--panel-bg);
        border-radius: var(--card-radius);
        padding: 20px;
        box-shadow: var(--card-shadow);
        border: 1px solid var(--card-border);
        margin: 0 auto 18px;
        padding: 16px 20px 20px 20px;
        box-sizing: border-box;
    }

    .dashboard-panel {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
        align-items: start;
        grid-auto-rows: 320px;
        margin: 0;
        width: 100%;
        box-sizing: border-box;
    }

    @media (max-width: 1100px) {
        .dashboard-panel {
            grid-template-columns: repeat(2, 1fr);
        }
    }

    @media (max-width: 700px) {
        .dashboard-panel {
            grid-template-columns: 1fr;
        }
    }

    .top-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 20px;
        width: 100%;
        background: var(--hdr-bg);
        border: 1px solid var(--hdr-border);
        border-radius: 12px;
        padding: 12px 16px;
    }

    .top-header-left {
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .top-header-icon {
        width: 38px;
        height: 38px;
        border-radius: 10px;
        background: var(--hdr-icon-bg);
        border: 1px solid var(--hdr-icon-border);
        color: var(--hdr-icon-color);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
    }

    .top-header-title {
        font-size: 14px;
        font-weight: 700;
        color: var(--hdr-title-color);
        line-height: 1.2;
    }

    .top-header-sub {
        font-size: 18px;
        font-weight: 700;
        margin-top: 2px;
    }

    .controls-area {
        display: flex;
        gap: 10px;
        align-items: center;
        flex: 0 0 auto;
    }

    /* Last refresh as a pill */
    .last-refresh-pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: #ffffff;
        border: 1px solid var(--hdr-border);
        border-radius: 8px;
        padding: 7px 12px;
        font-size: 12px;
        color: var(--muted);
        white-space: nowrap;
    }

    .last-refresh-pill svg {
        color: var(--hdr-icon-color);
        flex-shrink: 0;
    }

    /* Refresh button */
    .btn-refresh {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: #ffffff;
        color: var(--text);
        border: 1px solid var(--hdr-border);
        padding: 8px 12px;
        border-radius: 10px;
        cursor: pointer;
        font-size: 13px;
        transition: transform .12s ease, box-shadow .12s ease, opacity .12s ease;
        box-shadow: 0 2px 8px rgba(12, 18, 26, 0.06);
        user-select: none;
    }

    .btn-refresh.icon-only {
        width: 110px;
        height: 46px;
        padding: 0;
        justify-content: center;
        border-radius: 10px;
        color: #747980;
        font-size: 13px;
        display: flex;
    }

    .btn-refresh:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 16px rgba(12, 18, 26, 0.10);
        border-color: var(--hdr-icon-color);
    }

    .btn-refresh:active {
        transform: translateY(0);
    }

    .btn-refresh.disabled {
        opacity: 0.6;
        pointer-events: none;
        transform: none;
    }

    .refresh-img {
        width: 20px;
        height: 20px;
        display: block;
        transition: transform .35s cubic-bezier(.2, .9, .2, 1);
    }

    .btn-refresh.spinning .refresh-img {
        animation: spin360 0.6s cubic-bezier(.4, 0, .2, 1) 1;
    }

    @keyframes spin360 {
        from {
            transform: rotate(0deg);
        }

        to {
            transform: rotate(360deg);
        }
    }

    @media (max-width: 560px) {
        .top-header {
            flex-wrap: wrap;
        }

        .controls-area {
            gap: 8px;
        }

        .top-header-sub {
            display: none;
        }
    }

    .status-card,
    .snmp-card {
        transition: transform .12s ease, box-shadow .12s ease;
    }

    /* =============================================
       CARD HEADER BAR
       ============================================= */
    .card-header-bar {
        margin: -16px -16px 12px -16px;
        padding: 10px 16px;
        border-radius: 13px 13px 0 0;
        background: var(--hdr-bg);
        border-bottom: 2px solid var(--hdr-border);
        display: flex;
        flex-direction: column;
        gap: 8px;
        position: static;
    }

    .snmp-card .card-header-bar {
        margin: -14px -14px 12px -14px;
        border-radius: 12px 12px 0 0;
    }

    /* Top row: icon + title (+ snmp-meta for full-row cards) */
    .header-top-row {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .card-header-icon {
        width: 35px;
        height: 35px;
        border-radius: 7px;
        background: var(--hdr-icon-bg);
        border: 1px solid var(--hdr-icon-border);
        color: var(--hdr-icon-color);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
    }

    .card-header-title {
        font-size: 15px;
        font-weight: 700;
        color: var(--hdr-title-color);
        margin: 0;
        padding: 0;
        white-space: nowrap;
        flex: 1;
    }

    /* Legend row — below the title row */
    .card-header-bar .legend {
        display: flex;
        flex-wrap: nowrap;
        gap: 6px;
        margin: 0;
        padding: 0;
        align-items: center;
    }

    .card-header-bar .legend-item {
        color: #374151;
        font-size: 11px;
        padding: 3px 8px;
        border-radius: 4px;
        background: #e0eaff;
        border: 1px solid var(--hdr-border);
        display: flex;
        align-items: center;
        gap: 5px;
        white-space: nowrap;
        cursor: pointer;
        user-select: none;
    }

    .card-header-bar .legend-item:hover {
        background: #c7d8f8;
    }

    /* snmp-meta right-aligned inside header-top-row */
    .card-header-bar .snmp-meta {
        margin-left: auto;
        font-size: 11px;
        color: var(--muted);
        text-align: right;
        white-space: nowrap;
    }

    .header-actions {
        margin-left: auto;
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .header-btn {
        background: linear-gradient(180deg, #ffffff, #f4fbfb);
        border: 1px solid var(--hdr-border);
        color: var(--hdr-title-color);
        font-size: 12px;
        font-weight: 600;
        padding: 6px 12px;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.2s ease;
        white-space: nowrap;
    }

    .header-btn:hover {
        background: #e6f0ff;
        border-color: var(--hdr-icon-color);
        transform: translateY(-1px);
        box-shadow: 0 4px 10px rgba(15, 23, 42, 0.08);
    }

    /* =============================================
       STATUS CARDS (3-column top row)
       ============================================= */
    .status-card {
        background: var(--panel-bg);
        border-radius: var(--card-radius);
        border: 1px solid var(--card-border);
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        height: 100%;
        box-shadow: 0 1px 2px rgba(15, 23, 42, .04), 0 8px 20px rgba(15, 23, 42, .04);
        overflow: hidden;
    }

    .status-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(15, 23, 42, .06), 0 12px 28px rgba(15, 23, 42, .06);
    }

    .status-header {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
    }

    .status-header>h3 {
        font-size: 13px;
        font-weight: normal !important;
        color: #6b7280;
        position: relative;
        display: inline-block;
        padding-bottom: 6px;
    }

    .status-header>h3::after {
        content: "";
        position: absolute;
        left: 0;
        bottom: 0;
        width: 100%;
        height: 3px;
        background: linear-gradient(180deg, #1083ca, #06b6b0);
        border-radius: 3px;
    }

    .service-table-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 6px;
        margin-top: 4px;
        margin-bottom: 4px;
        font-size: 13px;
        font-weight: 600;
        color: #6b7280;
    }

    .service-table-header span:first-child {
        flex: 1;
        text-align: left;
    }

    .service-table-header span:last-child {
        width: 40px;
        text-align: center;
    }

    .card-body {
        flex: 1;
        overflow-y: auto;
        overflow-x: hidden;
        padding-right: 8px;
    }

    .card-body::-webkit-scrollbar {
        width: 6px;
    }

    .card-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 6px;
    }

    .card-body::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
    }

    .card-center-message {
        width: 100%;
        height: 100%;
        min-height: 140px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        font-size: 15px;
        color: #6b7280;
    }

    /* =============================================
       SNMP / MODBUS / BACNET FULL-ROW CARDS
       ============================================= */
    .snmp-card {
        background: var(--panel-bg);
        border-radius: 12px;
        border: 1px solid var(--card-border);
        padding: 14px;
        box-shadow: 0 8px 28px rgba(15, 23, 42, 0.04);
        width: 100%;
        box-sizing: border-box;
        overflow: hidden;
    }

    .snmp-card:hover {
        transform: translateY(-6px);
        box-shadow: 0 14px 32px rgba(15, 23, 42, 0.06);
    }

    .snmp-meta {
        color: var(--muted);
        font-size: 12px;
        text-align: right;
    }

    /* =============================================
       SERVICE STATUS LIST
       ============================================= */
    .service-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 8px;
    }

    .service-row {
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
        padding: 10px 6px;
        border-radius: 8px;
        transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .service-row:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 20px rgba(15, 23, 42, 0.08);
    }

    .service-name {
        font-size: 15px;
        color: #0f1724;
    }

    .service-state {
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .service-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #9ca3af;
    }

    .service-disabled {
        color: #6b7280;
    }

    .service-disabled .service-dot {
        background: #9ca3af;
    }

    .service-running {
        color: #16a34a;
    }

    .service-running .service-dot {
        background: #22c55e;
        animation: pulseGreen 1.4s infinite;
    }

    @keyframes pulseGreen {
        0% {
            box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.6);
        }

        70% {
            box-shadow: 0 0 0 6px rgba(34, 197, 94, 0);
        }

        100% {
            box-shadow: 0 0 0 0 rgba(34, 197, 94, 0);
        }
    }

    @media (prefers-reduced-motion: reduce) {
        .service-running .service-dot {
            animation: none;
        }
    }

    /* =============================================
       LEGEND & COLOR BOXES
       ============================================= */
    .legend {
        display: flex;
        gap: 10px;
        margin-bottom: 10px;
        color: black;
    }

    .legend-item {
        display: flex;
        align-items: center;
        gap: 5px;
        font-size: 12px;
        cursor: pointer;
        padding: 5px;
        border-radius: 3px;
        user-select: none;
    }

    .color-box {
        width: 12px;
        height: 12px;
        border-radius: 3px;
    }

    .service-running-box {
        background-color: #22c55e;
    }

    .service-disabled-box {
        background-color: #9ca3af;
    }

    .on {
        background-color: #4CAF50;
        color: white;
    }

    .off {
        background-color: #F44336;
        color: white;
    }

    .not {
        background-color: #9E9E9E;
        color: white;
    }

    /* =============================================
       DIO & ANALOG CONTENT
       ============================================= */
    .digitalinput {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        max-width: 100%;
    }

    .datemeta {
        font-size: 11px;
        color: #6b7280;
        display: flex;
        flex-direction: column;
        gap: 2px;
    }

    .card {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 8px 12px;
        border-radius: 6px;
        font-size: 12px;
        color: white;
        font-weight: 600;
        margin: 4px;
    }

    .card.on {
        background-color: #22c55e;
    }

    .card.off {
        background-color: #ef4444;
    }

    .card.not {
        background-color: #9ca3af;
    }

    #analoginput {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
        gap: 12px;
        width: 100%;
    }

    .analog-card {
        background: linear-gradient(180deg, #ffffff, #fbfdfe);
        border: 1px solid rgba(15, 23, 42, 0.04);
        border-radius: 8px;
        padding: 6px 8px;
        min-height: 44px;
        display: flex;

<script>
    (function () {
        const lastEl = document.getElementById('lastUpdated');
        function update(ts) {
            const text = ts ? new Date(ts).toLocaleString() : new Date().toLocaleString();
            if (lastEl) lastEl.textContent = 'Last Refresh: ' + text;
        }
        update();
        const btn = document.getElementById('refreshBtn');
        if (btn) {
            btn.addEventListener('click', function () {
                btn.classList.add('spinning');
                btn.classList.add('disabled');
                update();
                if (window.dashboardReload) window.dashboardReload();
                setTimeout(() => {
                    btn.classList.remove('spinning');
                    btn.classList.remove('disabled');
                }, 700);
            });
        }
    })();
</script>
