<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="en" lang="en">

<head>
    <title>Silbo</title>
    <link rel="shortcut icon" href="/luci2/icons/Title.png">
    <link rel="stylesheet" href="/luci2/css/bootstrap.css">
    <link rel="stylesheet" href="/luci2/css/luci2.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <!--[if lt IE 9]>
            <script src="/luci2/html5.js"></script>
            <script src="/luci2/respond.min.js"></script>
        <![endif]-->
    <link rel="stylesheet" href="/luci2/css/fonts.css">
    <script type="text/javascript" src="/luci2/jquery-1.9.1.js"></script>
    <script type="text/javascript" src="/luci2/jquery.peity.js"></script>
    <script type="text/javascript" src="/luci2/bootstrap.js"></script>
    <script type="text/javascript" src="/luci2/luci2.js"></script>
    <script type="text/javascript" src="/luci2/moment.min.js"></script>
    <script type="text/javascript" src="/luci2/combodate.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.4.0/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.13/jspdf.plugin.autotable.min.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="content-type" content="text/html; charset=utf-8" />
    <script type="text/javascript">


        $(function () {
            var L = new LuCI2();
            var loginReason = localStorage.getItem("loginReason") || null;
            if (loginReason)
                localStorage.removeItem("loginReason");

            $('body').css({
                'background-size': 'cover',
                'background-repeat': 'no-repeat',
                'background-position': 'center'
            });

            $('.navbar').hide();
            $('#viewmenu').hide();
            $('#screensize').hide();
            $('.text-muted').hide();
            $('.bg-light').hide();

            L.ui.login(loginReason).then(function () {
                $('#login-main').empty();
                $('.navbar').show();
                $('#viewmenu').show();
                $('#screensize').show();
                $('#right-panel').hide();
                $('.text-muted').show();
                $('.bg-light').show();
                $('body').css('background', '#ffffff');
                L.ui.load();
                L.ui.actionsPanel();

            });
            $('#actionsTrigger').off('click.actionsPanel').on('click.actionsPanel', function (e) {
                e.preventDefault();
                L.ui.initActions();
            });


        });

    </script>
</head>

<body>
    <!-- style="border-top: 11px solid #13557E;" -->
    <div id="login-main" style="width: 100%;"></div>
    <div class="navbar navbar-inverse navbar-fixed-top" role="banner"
        style="border-top: 11px solid #13557E;border-left: 1px solid #13557E;">
        <!-- <div class="container"> -->
        <div class="navbar-header">
            <button type="button" class="navbar-toggle" data-toggle="collapse" data-target=".navbar-collapse">
                <span class="icon-bar"></span>
                <span class="icon-bar"></span>
                <span class="icon-bar"></span>
            </button>
            <img src="/luci2/icons/custom_logo.svg" class="logoimg" />
        </div>

        <div class="d-flex align-items-center nav-actions" role="toolbar" aria-label="Header actions">
            <!-- Router Actions (RA) -->
            <div style="position:relative;">
                <button id="actionsTrigger" class="action-btn1" aria-haspopup="dialog" aria-expanded="false"
                    title="Router Actions">
                    <span class="icon-circle"
                        style="width:25px;height:25px;border-radius:8px;background:linear-gradient(180deg,#eef4ff,#e7f1ff);color:#13557E;font-weight:700">RA</span>
                    <div class="d-flex flex-column text-start">
                        <span class="label">Router Actions</span>
                    </div>
                </button>
            </div>
        </div>




        <!-- ACTIONS PANEL (RA) -->
        <div id="router_actions">
        </div>
    </div>

    </div>

    <div id="viewmenu"></div>
    <div id="screensize" style="margin-top:10px">
        <div style="display:flex">
            <div class="collapse navbar-collapse" id="mainmenu">
            </div>
            <div id="maincontent" style="width: 100%;">
            </div>
        </div>
    </div>

    <footer class="bg-light">
        <p class="text-muted">&copy;&nbsp;2026 Invendis Technologies India Pvt. Ltd. &nbsp; • All Rights Reserved •
            &nbsp;Version v1.0.1</p>
    </footer>

</body>

</html>

    .logoimg {

        margin-left: 29px;

    }

        margin-right: 10px;

    }

        background: #f7fbff;

    .action-btn1:hover {
