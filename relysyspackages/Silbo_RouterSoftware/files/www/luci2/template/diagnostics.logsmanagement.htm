<div style="border-bottom: 1px solid #70707038">
  <h1 class="header">Logs Management</h1>
</div>

              </svg>Date Range <span class="selected-count">0</span>
            </button>
            <div class="filter-content" id="filter-content-4" aria-hidden="true">
              <div class="filter-options date-range-options">
                <div class="date-input-group">
                  <label for="date-min">From:</label>
                  <input type="date" id="date-min" name="date-min">
                </div>
                <div class="date-input-group">
                  <label for="date-max">To:</label>
                  <input type="date" id="date-max" name="date-max">
                </div>

                <button class="apply-filter">Apply</button>
                <button class="clear-filter">Clear</button>

          <button class="clear-all-filters">Clear All Filters</button>

        </div>
        <div id="pdfLoader" class="pdf-loader">
          <div class="loader-box">
            <div class="spinner"></div>
            <div class="loader-text">Generating PDF… Please wait</div>
          </div>
        </div>
        <table id="logTable">
          <thead>
            <tr>

              <svg class=" up-arrow" viewBox="0 0 16 16">

      <div class="modal-content">
        <div class="modal-header" style="border-bottom:1px solid #dddd">
          <h3 class="modal-title" id="updatetext">Please Selcet the Category to Download</h3>

<style>
  #logTable {
    table-layout: fixed;
    width: 100%;
    border-collapse: collapse;
  }

  #logTable th,
  #logTable td {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }


  #logTable th:nth-child(1),
  #logTable td:nth-child(1) {
    width: 125px;
  }

  #logTable th:nth-child(2),
  #logTable td:nth-child(2) {
    width: 130px;

  }

  #logTable th:nth-child(3),
  #logTable td:nth-child(3) {
    width: 135px;
  }

  #logTable th:nth-child(4),
  #logTable td:nth-child(4) {
    width: 125px;
  }

  #logTable th:nth-child(5),
  #logTable td:nth-child(5) {
    width: auto;
    white-space: normal;
  }

  .data-loader {
    /* position: fixed; */
    top: 10%;
    left: 15%;
    width: calc(100% - 15%);
    height: calc(100% - 10%);

    background: rgba(255, 255, 255, 0.88);

    display: flex;
    justify-content: center;
    align-items: center;

    z-index: 1000;
  }





  .data-loader .loader-box {
    margin-top: 10vh;
    text-align: center;
  }

  .data-loader .spinner {
    width: 28px;
    height: 28px;
    border: 3px solid #e2e8f0;
    border-top: 3px solid #1e5fa8;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 0 auto 8px auto;
  }

  .data-loader .loader-text {
    font-size: 13px;
    color: #1e5fa8;
    font-weight: 500;
  }

  @keyframes spin {
    to {
      transform: rotate(360deg);
    }
  }

  .pagecontent {
    border-color: #dbe5f1;
    background: #ffffff;
    box-shadow: 0px 10px 20px rgba(0, 60, 120, 0.06);
    border: 1px solid #dbe5f1;
    border-radius: 8px;
    width: 95%;
    padding: 14px;
    margin-bottom: 12px;
  }

  .header-content {
    width: 100%;
    max-width: 1300px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: linear-gradient(to right, #1e5fa8, #0f3f73);
    color: #ffffff;
    font-weight: 600;
    text-transform: uppercase;
    border-radius: 8px 8px 0 0;
    padding: 10px 16px;
    box-sizing: border-box;
  }

  .header-title {
    color: white;
    margin: 0;
    font-size: 1.25rem;

    font-weight: 600;
  }

  .subtitle {
    text-transform: none !important;
    padding-top: 6px;
    font-size: 10px;

  }

  .header-buttons {
    display: flex;
    gap: 8px;

  }

  .filter-toggle-button,
  .btn.primary {
    background: #ffffff;
    color: #1e5fa8;
    border: 1px solid #1e5fa8;

    padding: 4px 10px;

    font-weight: 500;
    font-size: 12px;
    border-radius: 5px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    transition: all 0.25s ease;
  }

  .filter-toggle-button:hover,
  .btn.primary:hover {
    background: #1e5fa8;
    color: #ffffff;
    border-color: #1e5fa8;
  }

  .filter-toggle-button svg,
  .btn.primary svg {
    width: 14px;

    height: 14px;
    fill: currentColor;
    margin-right: 4px;
  }

  .filter-toggle-button i {
    font-size: 13px;

  }

  /* ----------------------
     FILTER PANEL CSS
  ------------------------ */

  .filter-section-container {
    position: fixed;
    top: 115px;

    right: 0;
    height: 55%;

    width: 300px;

    background-color: var(--filter-white-bg, #ffffff);
    z-index: 1000;
    transform: translateX(100%);
    transition: transform 0.35s ease;
    padding: 0 16px 16px;

    box-sizing: border-box;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    border-radius: 10px;

    box-shadow: -4px 0 16px rgba(0, 60, 120, 0.08);

    border: 1px solid var(--border-color, #e5e7eb);
  }

  /* =========================
   FILTER SCROLLBAR STYLE
========================= */

  .filter-section-container {
    scrollbar-width: thin;
    scrollbar-color: #114d73 #f1f5f9;
    -webkit-overflow-scrolling: touch;
  }


  .filter-section-container::-webkit-scrollbar {
    width: 6px;

  }

  .filter-section-container::-webkit-scrollbar-track {
    background: #f1f5f9;

    border-radius: 10px;
  }

  .filter-section-container::-webkit-scrollbar-thumb {
    background-color: #114d73;

    border-radius: 10px;
    border: 1px solid #f1f5f9;
  }

  .filter-section-container::-webkit-scrollbar-thumb:hover {
    background-color: #0f3f5e;

  }

  .filter-options {
    scrollbar-width: thin;
    scrollbar-color: #114d73 #f1f5f9;
  }

  .filter-options::-webkit-scrollbar {
    width: 6px;
  }

  .filter-options::-webkit-scrollbar-track {
    background: #f1f5f9;
  }

  .filter-options::-webkit-scrollbar-thumb {
    background-color: #114d73;
    border-radius: 10px;
  }

  .filter-section-container.open {
    transform: translateX(0%);
  }

  @media (max-width: 768px) {
    .filter-section-container {
      width: 100%;
      top: 100px;
      height: 75%;

      right: 0;
      left: 0;
      border-radius: 10px 10px 0 0;

      box-shadow: 0 -3px 14px rgba(0, 0, 0, 0.08);

      transform: translateY(100%);
    }

    .filter-section-container.open {
      transform: translateY(0);
    }
  }

  .filter-group {
    margin-bottom: 10px;

    border: 1px solid var(--border-color);
    border-radius: 6px;

    transition: box-shadow 0.2s ease;
    background-color: #fff;
  }

  .filter-group:hover {
    box-shadow: 0 2px 8px rgba(0, 60, 120, 0.05);

  }

  .filter-header {
    background-color: var(--light-bg);
    padding: 8px 14px;

    border: none;
    border-radius: 6px;
    width: 100%;
    font-weight: 500;
    font-size: 12px;

    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;

    transition: background-color 0.2s ease, color 0.2s ease;
    color: var(--text-color);
  }

  .filter-header:hover {
    background-color: var(--light-blue);
    color: var(--primary-blue);
  }

  .filter-panel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }

  .filter-panel-header h3 {
    font-size: 14px !important;
    font-weight: 500 !important;
  }

  .filter-close-button {
    background: none;
    border: none;
    font-size: 1.6em;

    color: var(--medium-text);
    cursor: pointer;
    line-height: 1;

<script>
  document.querySelectorAll('.filter-search-box input[type="text"]').forEach(searchBox => {
    searchBox.addEventListener('input', function () {
      const filterGroup = this.closest('.filter-group');
      const searchTerm = this.value.toLowerCase();
      const options = filterGroup.querySelectorAll('.filter-options label');

      options.forEach(option => {
        const text = option.textContent.toLowerCase();
        option.style.display = text.includes(searchTerm) ? 'flex' : 'none';
      });
    });
  });

</script>
