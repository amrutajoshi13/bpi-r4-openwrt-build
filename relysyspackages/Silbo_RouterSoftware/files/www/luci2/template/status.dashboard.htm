<script>
    $('#maincontent1').ready(function () {
        const targetIDs = ['header1', 'pagecontent'];
        targetIDs.forEach(function (id) {
            const elements = $('[id="' + id.replace(/"/g, '\\"') + '"]');
            if (elements.length > 1) {
                elements.slice(1).remove();
            }
        });
    });

    document.querySelectorAll('.progress-container, .progress-card-item').forEach(container => {
        let valueElement = container.querySelector('.progress-bar-value') || container.querySelector('.progress-card-value');
        let progressFill = container.querySelector('.progress-fill-storage') || container.querySelector('.progress-card-fill');

        if (valueElement && progressFill) {
            let valueText = valueElement.textContent.trim();
            valueText = valueText.replace('%', '').trim();
            let value = parseFloat(valueText);

            if (!isNaN(value)) {
                let percentage = Math.max(0, Math.min(100, value));
                progressFill.style.width = percentage + "%";
                const metric = container.dataset.metric ? container.dataset.metric.toLowerCase() : '';
                const isFree = metric === 'free';

                progressFill.style.backgroundColor = getColorForValue(percentage, isFree);
            }
        }
    });

    function getColorForValue(percentage, isFree = false) {
        const p = Number(percentage);
        if (isNaN(p)) return "#9e9e9e";

        if (isFree) {
            if (p > 70) return "#4caf50"; // green  -> free is high (good)
            if (p > 50) return "#ffb300"; // yellow
            return "#f44336";             // red
        }

        if (p < 50) return "#4caf50";     // green
        if (p < 75) return "#ffb300";     // yellow
        return "#f44336";                 // red
    }

        for (let i = 1; i <= 4; i++) {
            const bar = document.createElement('div');
            bar.className = 'sig-bar' + (i <= level ? ' fill' : '');
            bar.style.height = (i * 3 + 4) + 'px';
            container.appendChild(bar);
        }
    }
