<div style="border-bottom: 1px solid #70707038">
  <h1 class="header">URL Filtering Configuration</h1>
</div>


<div class="pagecontent">

  <div style="text-align: right;" class="btnclass">
    <button type="button" class="btn btn-success btn-update" data-type="urlfilter" title="Update URL Filter"
      id="update_urlfilter">Update</button>
  </div>
  <div id="Update-URLFilter-Note"></div>

  <div class="panel panel-default">
    <div class="panel-heading">
      <h3 class="panel-title">URL Filtering Configurations</h3>
    </div>
    <p id="No-URLFilter-Config"></p>

    <div class="scrollable-x " id="section_vpn_ipsec"></div>

  </div>



  <div class="panel panel-default">
    <div class="panel-heading">
      <h3 class="panel-title">Add URL Filttering Configurations</h3>
    </div>

    <div class="panel-body">
      <div class="row">
        <div class="col-md-4">
          <label style="font-weight: 600;">Change Mode</label>
          <select class="form-control" id="Accesspolicy1">
            <option value="Blacklist">Blacklist</option>
            <option value="Whitelist">Whitelist</option>
          </select>

        </div>
        <div class="col-md-2">
          <div style="margin-top:30px;">
            <button class="btn btn-primary" id="ChangeMode1">Apply</button>
          </div>
        </div>
      </div>
      <div class="text-right" style="margin: 10px 10px 20px 0px;">
        <button class="btn btn-success" data-toggle="modal" id="addnew" title="Add New URL" data-target="#exampleModal">Add New</button>
      </div>
    </div>
  </div>


  <div class="panel panel-default">
    <div class="panel-heading">
      <h3 class="panel-title">Upload File</h3>
    </div>
    <div class="panel-body">
      <div class="cards" role="region" aria-label="Certificate cards">

        <div class="card export" id="url-card">

          <div>
            <div class="icon blue-circle">
              <img src="/luci2/icons/cloud-arrow-up.svg" alt="Upload" class="svg-white">
            </div>

            <!-- <h3 id="export-title">Upload NMS Certificate and Key</h3> -->

            <p>
              Click <strong>Upload</strong> to select and upload your URL filtering File.
              These files are required to enable secure validation and filtering of URLs.
            </p>
          </div>


          <div>
            <div class="controls">
              <button class="btn btn-primary" type="button" id="btn_upload" aria-label="URL Filtering configuration">
                Upload
              </button>
            </div>
            <div class="meta">Last Upload: <span id="last-upload-url">No backups yet</span></div>
          </div>
        </div>

      </div>


    </div>

  </div>




  <div class="modal fade" id="exampleModal" tabindex="-1" role="dialog" aria-labelledby="exampleModalLabel"
    aria-hidden="true">
    <div class="modal-dialog" role="document">
      <div class="modal-content">
        <div class="modal-header modal-title">
          <h3 id="updatetext">Basic Information</h3>
        </div>
        <div class="modal-body">
          <div class="row">
            <div class="col-md-3">
              <label style="float:right">Status:</label>
            </div>
            <div class="col-md-7">
              <div style="margin-bottom:20px">
                <label class="switch">
                  <input type="checkbox" checked id="UrlfilteringSwitch">
                  <span class="slider round"></span>
                </label>
              </div>
            </div>
          </div>
          <div class="row">
            <div class="col-md-3">
              <label style="float:right">URL Blocking:</label>
            </div>
            <div class="col-md-7">
              <input type="text" id="UrlBlocking" class="form-control" style="margin-bottom: 10px;"
                placeholder="example.com">
              <div class="luci2-field-error label label-danger" id="validationResult" style="display: none;"></div>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-success" id='Applyconfig'>Save</button>
          <button type="button" class="btn btn-default" data-dismiss="modal">Cancel</button>
        </div>
      </div>
    </div>
  </div>
</div>


<style>
  #Update-URLFilter-Note {
    margin: -64px 0px 0px 8px;
  }

  .cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    width: 100%;
    height: auto;
    border: none !important;
    box-shadow: none !important;
    background-color: none !important;
  }

  .card {
    background: linear-gradient(180deg, rgba(255, 255, 255, 0.96), #fff);
    border-radius: 14px;
    padding: 22px;
    border: 1px solid rgba(11, 63, 150, 0.06);
    /* box-shadow: 0 18px 40px rgba(11, 38, 85, 0.06); */
    box-shadow: none !important;
    min-height: 240px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    transition: transform .22s cubic-bezier(.2, .9, .2, 1), box-shadow .22s ease;
  }

  /* .card:hover {
		transform: translateY(-6px);
		box-shadow: 0 30px 70px rgba(11, 38, 85, 0.08);
	} */


  .icon.blue-circle {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    margin: 0 auto 12px auto;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #0b63d1 0%, #2fb3ff 100%);
    /* box-shadow: 0 10px 30px rgba(11, 63, 209, 0.12); */
  }


  .icon.blue-circle img.svg-white {
    width: 46px;
    height: 46px;
    filter: brightness(0) invert(1);
  }


  .card h3 {
    text-align: left;
    font-size: 16px;
    margin: 11px 0px 20px 5px !important;
    color: #071032;
    font-weight: 800;
    border-bottom: 1px solid rgba(16, 32, 52, 0.04)
  }

  .card p {
    text-align: center;
    color: #55607a;
    font-size: 13px;
    margin: 0 0 14px;
    padding: 0 4px
  }

  .controls {
    display: flex;
    gap: 12px;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
    margin-top: 8px
  }


  .meta {
    margin-top: 14px;
    font-size: 12px;
    color: #6b7280;
    text-align: center;
  }
</style>



<script>
  $(document).ready(function () {
    $('[data-toggle="popover"]').popover({
      placement: 'bottom',
      // offset: '0 50px' 
    });
  });


  const lastSelected = localStorage.getItem('Accesspolicy1');
  if (lastSelected) {
    $('#Accesspolicy1').val(lastSelected);
  }

  // Save the selected option to localStorage on change
  $('#Accesspolicy1').on('change', function () {
    localStorage.setItem('Accesspolicy1', $(this).val());
  });

</script>
