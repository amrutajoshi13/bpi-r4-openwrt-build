<div class="modal fade" id="exampleModal" tabindex="-1" role="dialog" aria-labelledby="exampleModalLabel"
    aria-hidden="true">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <div class="modal-header modal-title">
                <h3 id="vlanModalTitle">Password Change</h3>
            </div>
            <div class="modal-body">
                <div class="password-form">
                    <label for="current-password">Current Password</label>
                    <div class="password-container">
                        <input type="password" id="current-password" name="current-password"
                            placeholder="Enter current password " required>
                        <span class="show-hide" onclick="togglePasswordVisibility('current-password')">Show</span>
                    </div>

                    <label for="new-password">New Password</label>
                    <div class="password-container">
                        <input type="password" id="new-password" name="new-password" placeholder="Enter new password "
                            required>
                        <span class="show-hide" onclick="togglePasswordVisibility('new-password')">Show</span>
                    </div>

                    <label for="confirm-password">Confirm Password</label>
                    <div class="password-container">
                        <input type="password" id="confirm-password" name="confirm-password"
                            placeholder="re-enter new password " required>
                        <span class="show-hide" onclick="togglePasswordVisibility('confirm-password')">Show</span>
                    </div>

                    <div class="error-message" id="password-error"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary" onclick="savePassword()">Change</button>
                    <button type="button" class="btn btn-default" data-dismiss="modal" id="passcancel">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <style>
        .modal-dialog {
            width: 520px !important;
        }

        .password-form label {
            display: block;
            margin-bottom: 10px;
            font-family: system-ui, sans-serif;
            font-size: 12px;
            font-weight: 600;

        }

        .password-form .password-container {
            position: relative;
            margin-bottom: 15px;
        }

        /* .password-form input[type="password"]::placeholder,
        .password-form input[type="text"]::placeholder {
            font-size: 14px;
            font-family: system-ui, sans-serif;
            color: #888;
        } */

        .password-form input[type="password"],
        .password-form input[type="text"] {
            font-weight: 400;
            font-family: system-ui, sans-serif;
            width: calc(100% - 120px);
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 14px;
            box-sizing: border-box;
            transition: border-color 0.3s ease;
        }

        .password-form input[type="password"]:focus,
        .password-form input[type="text"]:focus {
            border-color: #336D85;
            outline: none;
        }

        .password-form .show-hide {
            font-family: system-ui, sans-serif;
            font-weight: 600;
            position: absolute;
            top: 50%;
            right: 2px;
            transform: translateY(-50%);
            cursor: pointer;
            color: #14213D;
        }

        .password-form button {
            width: 50%;
            padding: 10px;
            margin: 30px auto;
            background-color: #336D85;
            color: #fff;
            display: block;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        .password-form button:hover {
            background-color: #20566d;
        }

        .error-message {
            color: #ff0000;
            font-size: 12px;
        }
    </style>


    <script>

        function togglePasswordVisibility(passwordFieldId) {
            var passwordField = document.getElementById(passwordFieldId);
            var showHideSpan = passwordField.nextElementSibling;

            if (passwordField.type === 'password') {
                passwordField.type = 'text';
                showHideSpan.textContent = 'Hide';
            } else {
                passwordField.type = 'password';
                showHideSpan.textContent = 'Show';
            }

            passwordField.focus();
        }
    </script>
